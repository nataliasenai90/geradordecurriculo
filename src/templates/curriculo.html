<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Currículo</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&display=swap');

        :root {
            --primary-color: #333;
            --text-color: #444;
            --border-color: #ccc;
            --font-family: 'Inter', sans-serif;
            --h-color: #222;
        }

        body.classic {
            --primary-color: #111;
            --text-color: #333;
            --border-color: #000;
            --font-family: 'Lora', serif;
            --h-color: #000;
        }

        body.modern {
            --primary-color: #2563eb;
            --text-color: #4b5563;
            --border-color: #e5e7eb;
            --font-family: 'Inter', sans-serif;
            --h-color: #1f2937;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            color: var(--text-color);
            line-height: 1.5;
            background: #fff;
            padding: 0;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            position: relative;
        }

        .header h1 {
            font-size: 22pt;
            color: var(--h-color);
            margin-bottom: 5px;
            font-weight: 700;
        }

        .header p {
            font-size: 11pt;
            color: var(--text-color);
        }

        .foto-perfil {
            position: absolute;
            top: 0;
            right: 0;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary-color);
        }

        .divider {
            border: 0;
            border-top: 1px solid var(--primary-color);
            margin: 20px 0;
        }

        .section {
            margin-bottom: 25px;
            page-break-inside: avoid;
        }

        .section-title {
            font-size: 14pt;
            font-weight: 700;
            color: var(--primary-color);
            text-transform: uppercase;
            margin-bottom: 5px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 3px;
        }

        .item {
            margin-bottom: 15px;
            page-break-inside: avoid;
        }

        .item h4 {
            font-size: 12pt;
            color: var(--h-color);
            font-weight: 600;
        }

        .item p {
            font-size: 11pt;
            margin: 2px 0;
        }

        .item p.desc {
            margin-top: 5px;
            font-size: 10.5pt;
        }

        .habilidades {
            font-size: 11pt;
            line-height: 1.8;
        }
    </style>
</head>
<body class="{{body_class}}">
    <div class="header">
        <h1>{{nome}}</h1>
        <p>{{contatos}}</p>
        {{foto}}
    </div>

    <hr class="divider">

    <div class="section">
        <h2 class="section-title">Objetivo Profissional</h2>
        <p>{{objetivo}}</p>
    </div>

    <div class="section">
        <h2 class="section-title">Experiência Profissional</h2>
        <div id="experiencias-container">
            {{experiencias}}
        </div>
    </div>

    <div class="section">
        <h2 class="section-title">Formação Acadêmica</h2>
        <div id="formacoes-container">
            {{formacoes}}
        </div>
    </div>

    <div class="section">
        <h2 class="section-title">Habilidades</h2>
        <p class="habilidades">{{habilidades}}</p>
    </div>
</body>
</html>
